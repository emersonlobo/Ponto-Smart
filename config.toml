[theme]
primaryColor = "#2196F3"
backgroundColor = "#f0f2f6"
secondaryBackgroundColor = "#e8eef2"
textColor = "#333333"
font = "sans serif"

[client]
showErrorDetails = true

[logger]
level = "info"

[server]
port = 8501
headless = true
runOnSave = true
maxUploadSize = 200
enableCORS = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[cache]
maxDiskCacheSize = 1
cachedMessageExpirationSeconds = 3600
diskCacheStaleness = 604800

[client.toolbars]
toolbarMode = "minimal"
